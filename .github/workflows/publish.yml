---
name: Publish Crates

on:
  push:
    tags:
      - v*

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo-release Cache
        id: cargo_release_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-release
          key: ${{ runner.os }}-cargo-release

      - name: cargo login
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish
        run: |
          set -euo pipefail

          publish_crate() {
            local crate="$1"
            local out
            echo "Publishing ${crate}..."

            set +e
            out="$(cargo publish --no-verify --package "${crate}" 2>&1)"
            status=$?
            set -e

            echo "${out}"

            if [ "${status}" -eq 0 ]; then
              sleep 120
              return 0
            fi

            if echo "${out}" | grep -Eq "already uploaded|already exists on crates\\.io index"; then
              echo "Skipping ${crate}: version already published."
              return 0
            fi

            echo "Failed publishing ${crate}."
            return "${status}"
          }

          publish_crate ispm-wrapper
          publish_crate simics-python-utils
          publish_crate simics-package
          publish_crate simics-sign
          publish_crate cargo-simics-build
          publish_crate simics-api-sys
          publish_crate simics-build-utils
          publish_crate simics-macro
          publish_crate simics
          publish_crate simics-test

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
